name: Release

# On every push to main, Changesets either opens/updates a "Version Packages"
# PR (when unreleased changesets exist) or — once that PR is merged — publishes
# the bumped packages to GitHub Packages.
on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write       # push the version PR / tags
  pull-requests: write  # open the version PR
  packages: write       # publish to GitHub Packages

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: "@aeros-core"

      - run: pnpm install --frozen-lockfile

      - name: Create Release PR or publish to GitHub Packages
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
